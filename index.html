    const db = firebase.firestore();
    async function loadVotes() {
      try {
        const snap = await db.collection("votes").get();
        return snap.docs.map(d => d.data());
      } catch(e) { console.error(e); return []; }
    }
    async function saveVote(entry) {

      catch(e) { console.error(e); }

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const PARAMS = {
      outline_ratio:  { axis: "輪郭", label: "縦横比" },
      ear_size:       { axis: "耳",   label: "耳の大きさ" },
      ear_length:     { axis: "耳",   label: "耳の長さ" },
      ear_pointy:     { axis: "耳",   label: "耳の尖り" },
      ear_position:   { axis: "耳",   label: "耳の位置" },
      eye_ratio:      { axis: "目",   label: "目の縦横比" },
      eye_angle:      { axis: "目",   label: "目の角度" },
      nose_size:      { axis: "鼻",   label: "鼻の大きさ" },
      nose_angle:     { axis: "鼻",   label: "鼻の角度" },
      whisker_count:  { axis: "ヒゲ", label: "ヒゲの本数" },
      whisker_pos:    { axis: "ヒゲ", label: "ヒゲの位置" },
      mouth_size:     { axis: "輪郭", label: "口の大きさ" },
    };
    const PARAM_KEYS = Object.keys(PARAMS);
    const AXES = ["輪郭", "耳", "目", "鼻", "ヒゲ"];
    const YES_LIMIT = 5;

    function randomParams() {
      const p = {};
      PARAM_KEYS.forEach(k => { p[k] = Math.floor(Math.random() * 21); });
      return p;
    }
    function normalize(params) {
      const n = {};
      PARAM_KEYS.forEach(k => { n[k] = params[k] / 20; });
      return n;
    }
    function paramsKey(params) { return PARAM_KEYS.map(k => params[k]).join("-"); }
    function calcAxisScores(normParams) {
      const sums = {}, counts = {};
      AXES.forEach(a => { sums[a] = 0; counts[a] = 0; });
      PARAM_KEYS.forEach(k => { const ax = PARAMS[k].axis; sums[ax] += normParams[k]; counts[ax]++; });
      const result = {};
      AXES.forEach(a => { result[a] = Math.round((sums[a] / counts[a]) * 100); });
      return result;
    }
    function calcAvgNormParams(yesVotes) {
      if (!yesVotes.length) return null;
      const sum = {};
      PARAM_KEYS.forEach(k => { sum[k] = 0; });
      yesVotes.forEach(v => { PARAM_KEYS.forEach(k => { sum[k] += v.params[k]; }); });
      const avg = {};
      PARAM_KEYS.forEach(k => { avg[k] = sum[k] / yesVotes.length / 20; });
      return avg;
    }
    function calcFarthestNorm(avgNorm) {
      if (!avgNorm) return null;
      const far = {};
      PARAM_KEYS.forEach(k => { far[k] = avgNorm[k] >= 0.5 ? 0 : 1; });
      return far;
    }
    function calcGiriGiriNorm(myYesVotes, useMax) {
      if (!myYesVotes.length) return null;
      const result = {};
      PARAM_KEYS.forEach(k => {
        const vals = myYesVotes.map(n => n[k]);
        result[k] = useMax ? Math.max(...vals) : Math.min(...vals);
      });
      return result;
    }

    // ============================================================
    // Canvas猫描画
    // ============================================================
    function drawCatOnCanvas(ctx, norm, x, y, size) {
      const cx = x + size / 2, cy = y + size * 0.55;
      const scale = size / 200;
      const rx = (40 + (1 - norm.outline_ratio) * 20) * scale;
      const ry = (38 + norm.outline_ratio * 22) * scale;
      const earWidth = (10 + norm.ear_size * 20) * scale;
      const earLen = (16 + norm.ear_length * 80) * scale;
      const earPointy = norm.ear_pointy;
      const earAngleDeg = 90 - norm.ear_position * 80;
      const earAngleRad = (earAngleDeg * Math.PI) / 180;
      function getEarPoints(sign) {
        const ang = sign === 1 ? earAngleRad : Math.PI - earAngleRad;
        const ec = { x: cx + rx * Math.cos(ang), y: cy - ry * Math.sin(ang) };
        const dir = { dx: Math.cos(ang), dy: -Math.sin(ang) };
        const perp = { dx: -dir.dy * sign, dy: dir.dx * sign };
        const half = earWidth * 0.5;
        return { b1:{x:ec.x+perp.dx*half,y:ec.y+perp.dy*half}, b2:{x:ec.x-perp.dx*half,y:ec.y-perp.dy*half}, tip:{x:ec.x+dir.dx*earLen,y:ec.y+dir.dy*earLen}, half, ec };
      }
      [1,-1].forEach(sign => {
        const {b1,b2,tip,half,ec} = getEarPoints(sign);
        ctx.beginPath(); ctx.moveTo(b1.x,b1.y);
        if (earPointy<0.05) ctx.arc(ec.x,ec.y,half,0,Math.PI,sign===1);
        else if (earPointy<0.5) ctx.quadraticCurveTo(tip.x,tip.y,b2.x,b2.y);
        else { ctx.lineTo(tip.x,tip.y); ctx.lineTo(b2.x,b2.y); }
        ctx.closePath(); ctx.fillStyle="#f0deca"; ctx.fill();
        ctx.strokeStyle="#d4b89a"; ctx.lineWidth=1.2*scale; ctx.lineJoin="round"; ctx.stroke();
      });
      ctx.beginPath(); ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2); ctx.fillStyle="#fef8f0"; ctx.fill();
      ctx.strokeStyle="#d4b89a"; ctx.lineWidth=1.5*scale; ctx.stroke();
      const eyeMinR=1.5*scale, eyeMaxLen=8*scale;
      const eyeLen=eyeMinR+norm.eye_ratio*(eyeMaxLen-eyeMinR);
      const eyeY=cy-ry*0.22, eyeX=rx*0.44;
      const eyeAngleRad=(norm.eye_angle*175*Math.PI)/180;
      const eyeHalf={dx:eyeLen*Math.cos(eyeAngleRad), dy:eyeLen*Math.sin(eyeAngleRad)};
      const eyeStrokeW=Math.max(eyeMinR*2,3*scale);
      // 右目
      ctx.beginPath();
      ctx.moveTo(cx+eyeX-eyeHalf.dx, eyeY-eyeHalf.dy);
      ctx.lineTo(cx+eyeX+eyeHalf.dx, eyeY+eyeHalf.dy);
      ctx.strokeStyle="#1a1a1a"; ctx.lineWidth=eyeStrokeW; ctx.lineCap="round"; ctx.stroke();
      // 左目（左右対称）
      ctx.beginPath();
      ctx.moveTo(cx-eyeX+eyeHalf.dx, eyeY-eyeHalf.dy);
      ctx.lineTo(cx-eyeX-eyeHalf.dx, eyeY+eyeHalf.dy);
      ctx.stroke();
      const noseSize=norm.nose_size*22*scale, noseY=cy+ry*0.15;
      const nt=noseY-noseSize*0.3, nb=noseY+noseSize*0.6, noseBottom=nb;
      const nr=cx+noseSize, nl=cx-noseSize, nr2=noseSize*0.35;
      if (noseSize>0.5) {
        ctx.beginPath();
        ctx.moveTo(cx, nt);
        ctx.quadraticCurveTo(nr-nr2, nt, nr-nr2*0.3, nt+nr2*0.7);
        ctx.quadraticCurveTo(nr, nb-nr2, cx, nb);
        ctx.quadraticCurveTo(nl, nb-nr2, nl+nr2*0.3, nt+nr2*0.7);
        ctx.quadraticCurveTo(nl+nr2, nt, cx, nt);
        ctx.closePath();
        ctx.fillStyle="#e899a0"; ctx.fill();
        ctx.strokeStyle="#c06070"; ctx.lineWidth=0.8*scale; ctx.stroke();
      }
      const mouthSize=norm.mouth_size*(noseY-(cy-ry*0.22))*0.85;
      if (mouthSize>0.5) {
        const my = noseBottom;
        ctx.beginPath(); ctx.moveTo(cx,my); ctx.quadraticCurveTo(cx-mouthSize*0.6,my+mouthSize*0.7,cx-mouthSize,my+mouthSize*0.4);
        ctx.strokeStyle="#666"; ctx.lineWidth=1.4*scale; ctx.lineCap="round"; ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx,my); ctx.quadraticCurveTo(cx+mouthSize*0.6,my+mouthSize*0.7,cx+mouthSize,my+mouthSize*0.4);
        ctx.stroke();
      }
      const wCount=Math.round(norm.whisker_count*15), wBaseLen=22*scale, MAX_PER_LAYER=5, wSpacing=8*scale, wStartX=norm.whisker_pos*rx;
      for (let i=0;i<wCount;i++) {
        const layer=Math.floor(i/MAX_PER_LAYER), idxInLayer=i%MAX_PER_LAYER;
        const countInLayer=Math.min(wCount-layer*MAX_PER_LAYER,MAX_PER_LAYER);
        const wLen=wBaseLen*(1+layer*0.5), startX=wStartX+layer*wBaseLen;
        const wy=noseY-(countInLayer-1)*wSpacing/2+idxInLayer*wSpacing;
        const spread=(idxInLayer-(countInLayer-1)/2)*0.15;
        const ex=wLen*Math.cos(spread), ey=wLen*Math.sin(spread)*0.4;
        [1,-1].forEach(sign => {
          ctx.beginPath(); ctx.moveTo(cx+sign*startX,wy); ctx.lineTo(cx+sign*(startX+ex),wy+ey);
          ctx.strokeStyle="#f0deca"; ctx.lineWidth=0.9*scale; ctx.lineCap="round"; ctx.stroke();
        });
      }
    }

    // ============================================================
    // SVG 猫顔
    // ============================================================
    function CatFace({ norm, size = 200 }) {
      const W = size, H = size, cx = size / 2, cy = size * 0.55;
      const scale = size / 200;
      const rx = (40 + (1 - norm.outline_ratio) * 20) * scale;
      const ry = (38 + norm.outline_ratio * 22) * scale;
      const earWidth = (10 + norm.ear_size * 20) * scale;  // 幅
      const earLen = (16 + norm.ear_length * 80) * scale;  // 長さ（ウサギ耳まで）
      const earPointy = norm.ear_pointy;
      const earAngleDeg = 90 - norm.ear_position * 80;     // 10°〜90°
      const earAngleRad = (earAngleDeg * Math.PI) / 180;
      function earCenter(sign) {
        const ang = sign === 1 ? earAngleRad : Math.PI - earAngleRad;
        return { x: cx + rx * Math.cos(ang), y: cy - ry * Math.sin(ang) };
      }
      function earOutDir(sign) {
        const ang = sign === 1 ? earAngleRad : Math.PI - earAngleRad;
        return { dx: Math.cos(ang), dy: -Math.sin(ang) };
      }
      function earPath(sign) {
        const ec = earCenter(sign), dir = earOutDir(sign);
        const perp = { dx: -dir.dy * sign, dy: dir.dx * sign };
        const half = earWidth * 0.5;
        const tipDist = earLen;
        const bx1 = ec.x + perp.dx * half, by1 = ec.y + perp.dy * half;
        const bx2 = ec.x - perp.dx * half, by2 = ec.y - perp.dy * half;
        const tipX = ec.x + dir.dx * tipDist, tipY = ec.y + dir.dy * tipDist;
        if (earPointy < 0.05) return `M ${bx1} ${by1} A ${half} ${half} 0 0 ${sign === 1 ? 0 : 1} ${bx2} ${by2} Z`;
        if (earPointy < 0.5) return `M ${bx1} ${by1} Q ${tipX} ${tipY} ${bx2} ${by2} Z`;
        return `M ${bx1} ${by1} L ${tipX} ${tipY} L ${bx2} ${by2} Z`;
      }
      // 目: 最小=点(・)、最大=横線(ー)
      const eyeMinR = 1.5 * scale;
      const eyeMaxLen = 8 * scale;
      const eyeLen = eyeMinR + norm.eye_ratio * (eyeMaxLen - eyeMinR);
      const eyeY = cy - ry * 0.22, eyeX = rx * 0.44;
      // 0〜175°、左右対称（右目は+角度、左目は-角度）
      const eyeAngleDeg = norm.eye_angle * 175;
      const eyeAngleRad = (eyeAngleDeg * Math.PI) / 180;
      const eyeHalf = { dx: eyeLen * Math.cos(eyeAngleRad), dy: eyeLen * Math.sin(eyeAngleRad) };
      const eyeStrokeW = Math.max(eyeMinR * 2, 3 * scale);
      const noseSize = norm.nose_size * 22 * scale; // コアラサイズまで
      const noseY = cy + ry * 0.15;
      const mouthSize = norm.mouth_size * (noseY - eyeY) * 0.85;
      const wCount = Math.round(norm.whisker_count * 15);
      const wBaseLen = 22 * scale, MAX_PER_LAYER = 5, wSpacing = 8 * scale;
      const wStartX = norm.whisker_pos * rx;
      const whiskers = [];
      for (let i = 0; i < wCount; i++) {
        const layer = Math.floor(i / MAX_PER_LAYER);
        const idxInLayer = i % MAX_PER_LAYER;
        const countInLayer = Math.min(wCount - layer * MAX_PER_LAYER, MAX_PER_LAYER);
        const wLen = wBaseLen * (1 + layer * 0.5);
        const startX = wStartX + layer * wBaseLen;
        const wy = noseY - (countInLayer - 1) * wSpacing / 2 + idxInLayer * wSpacing;
        const spread = (idxInLayer - (countInLayer - 1) / 2) * 0.15;
        const ex = wLen * Math.cos(spread), ey = wLen * Math.sin(spread) * 0.4;
        whiskers.push(
          <line key={`r${i}`} x1={cx+startX} y1={wy} x2={cx+startX+ex} y2={wy+ey} stroke="#f0deca" strokeWidth={0.9*scale} strokeLinecap="round"/>,
          <line key={`l${i}`} x1={cx-startX} y1={wy} x2={cx-startX-ex} y2={wy+ey} stroke="#f0deca" strokeWidth={0.9*scale} strokeLinecap="round"/>
        );
      }
      return (
        <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`}>
          <path d={earPath(1)} fill="#f0deca" stroke="#d4b89a" strokeWidth={1.2*scale} strokeLinejoin="round"/>
          <path d={earPath(-1)} fill="#f0deca" stroke="#d4b89a" strokeWidth={1.2*scale} strokeLinejoin="round"/>
          <ellipse cx={cx} cy={cy} rx={rx} ry={ry} fill="#fef8f0" stroke="#d4b89a" strokeWidth={1.5*scale}/>
          <line x1={cx+eyeX-eyeHalf.dx} y1={eyeY-eyeHalf.dy} x2={cx+eyeX+eyeHalf.dx} y2={eyeY+eyeHalf.dy} stroke="#1a1a1a" strokeWidth={eyeStrokeW} strokeLinecap="round"/>
          <line x1={cx-eyeX+eyeHalf.dx} y1={eyeY-eyeHalf.dy} x2={cx-eyeX-eyeHalf.dx} y2={eyeY+eyeHalf.dy} stroke="#1a1a1a" strokeWidth={eyeStrokeW} strokeLinecap="round"/>
          {noseSize > 0.5 && (() => {
            const nl = cx - noseSize, nr = cx + noseSize;
            const nt = noseY - noseSize * 0.3, nb = noseY + noseSize * 0.6;
            const r = noseSize * 0.35;
            return (
              <path d={`
                M ${cx} ${nt}
                Q ${nr - r} ${nt} ${nr - r*0.3} ${nt + r*0.7}
                Q ${nr} ${nb - r} ${cx} ${nb}
                Q ${nl} ${nb - r} ${nl + r*0.3} ${nt + r*0.7}
                Q ${nl + r} ${nt} ${cx} ${nt} Z`}
                fill="#e899a0" stroke="#c06070" strokeWidth={0.8*scale}/>
            );
          })()}
          {mouthSize > 0.5 && (<>
            <path d={`M ${cx} ${noseY+noseSize*0.6} Q ${cx-mouthSize*0.6} ${noseY+noseSize*0.6+mouthSize*0.7} ${cx-mouthSize} ${noseY+noseSize*0.6+mouthSize*0.4}`} fill="none" stroke="#666" strokeWidth={1.4*scale} strokeLinecap="round"/>
            <path d={`M ${cx} ${noseY+noseSize*0.6} Q ${cx+mouthSize*0.6} ${noseY+noseSize*0.6+mouthSize*0.7} ${cx+mouthSize} ${noseY+noseSize*0.6+mouthSize*0.4}`} fill="none" stroke="#666" strokeWidth={1.4*scale} strokeLinecap="round"/>
          </>)}

          {whiskers}
        </svg>
      );
    }

    // ============================================================
    // Chart.jsレーダー（自分・みんな平均のみ）
    // ============================================================
    function CatRadar({ myAvg, allAvg }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);
      useEffect(() => {
        if (!canvasRef.current) return;
        if (chartRef.current) chartRef.current.destroy();
        const datasets = [];
        if (allAvg) datasets.push({ label: "みんなYES平均", data: AXES.map(a => allAvg[a]), borderColor: "#52b06a", backgroundColor: "rgba(82,176,106,0.15)", borderDash: [2,3], pointRadius: 2 });
        if (myAvg) datasets.push({ label: "自分YES平均", data: AXES.map(a => myAvg[a]), borderColor: "#4a90e8", backgroundColor: "rgba(74,144,232,0.15)", borderDash: [4,2], pointRadius: 2 });
        if (!datasets.length) return;
        chartRef.current = new Chart(canvasRef.current, {
          type: "radar",
          data: { labels: AXES, datasets },
          options: {
            scales: { r: { min:0, max:100, ticks:{display:false}, pointLabels:{font:{size:12},color:"#7a6a5a"}, grid:{color:"#d4c5b5"} } },
            plugins: { legend: { labels: { font:{size:11}, boxWidth:20 } } },
            animation: false,
          }
        });
      }, [myAvg, allAvg]);
      return <canvas ref={canvasRef} style={{maxHeight:240}}/>;
    }

    // ============================================================
    // 画像生成（4:3）
    // ============================================================
    function generateResultDataURL(myAvg, myFar, giri1, giri2, yesCount, totalCount) {
      const W = 560, H = 420;
      const canvas = document.createElement("canvas");
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext("2d");

      ctx.fillStyle = "#faf5ef";
      ctx.fillRect(0, 0, W, H);

      // ヘッダー
      const HEADER_H = 44;
      ctx.fillStyle = "#3a2e28";
      ctx.fillRect(0, 0, W, HEADER_H);
      ctx.fillStyle = "#faf5ef";
      ctx.font = "bold 20px sans-serif";
      ctx.textAlign = "left";
      ctx.fillText("許容ネコ", 16, 28);
      ctx.font = "13px sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.55)";
      ctx.fillText("判定レポート", 110, 28);

      const PAD = 8;
      const BODY_Y = HEADER_H + PAD;
      const BODY_H = H - BODY_Y - PAD;

      // 左 3/5、右 2/5
      const LEFT_W = Math.floor(W * 3 / 5) - PAD;
      const RIGHT_X = Math.floor(W * 3 / 5) + PAD;
      const RIGHT_W = W - RIGHT_X - PAD;

      // 左カード（平均猫）
      ctx.fillStyle = "white";
      ctx.beginPath(); ctx.roundRect(PAD, BODY_Y, LEFT_W, BODY_H, 12); ctx.fill();

      if (myAvg) {
        const catSize = Math.min(LEFT_W, BODY_H) - 60;
        const catX = PAD + LEFT_W/2 - catSize/2;
        const catY = BODY_Y + 10;
        drawCatOnCanvas(ctx, myAvg, catX, catY, catSize);

        // 猫すぎる ラベル
        ctx.fillStyle = "#3a2e28";
        ctx.font = "bold 13px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("猫すぎる", PAD + LEFT_W/2, BODY_Y + catSize + 24);

        // 許容した猫 xx匹 / xx(自分の総投票数)
        ctx.font = "11px sans-serif";
        ctx.fillStyle = "#7a6a5a";
        ctx.fillText("許容した猫", PAD + LEFT_W/2, BODY_Y + catSize + 40);
        ctx.font = "bold 15px sans-serif";
        ctx.fillStyle = "#3a2e28";
        ctx.fillText(`${yesCount}匹 / ${totalCount}票`, PAD + LEFT_W/2, BODY_Y + catSize + 58);

        // 感謝メッセージ（30以上）
        if (yesCount >= 30) {
          ctx.font = "10px sans-serif";
          ctx.fillStyle = "#e8734a";
          ctx.fillText("たくさんの猫を", PAD + LEFT_W/2, BODY_Y + catSize + 74);
          ctx.fillText("許容してくれてありがとう！", PAD + LEFT_W/2, BODY_Y + catSize + 88);
        }
      }

      // 右3段
      const ROW_H = Math.floor(BODY_H / 3) - 3;
      const rows = [
        { norm: giri1, label: "ギリギリ猫" },
        { norm: giri2, label: "たぶん猫のはず" },
        { norm: myFar, label: "とても許容できない" },
      ];
      rows.forEach(({ norm, label }, i) => {
        const fy = BODY_Y + i * (ROW_H + 4);
        ctx.fillStyle = "white";
        ctx.beginPath(); ctx.roundRect(RIGHT_X, fy, RIGHT_W, ROW_H, 10); ctx.fill();
        if (norm) {
          const s = ROW_H - 20;
          drawCatOnCanvas(ctx, norm, RIGHT_X + RIGHT_W/2 - s/2, fy + 4, s);
        }
        ctx.fillStyle = "#3a2e28";
        ctx.font = "bold 9px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(label, RIGHT_X + RIGHT_W/2, fy + ROW_H - 5);
      });

      // URL（右上）
      ctx.fillStyle = "rgba(255,255,255,0.6)"; ctx.font = "9px sans-serif"; ctx.textAlign = "right";
      ctx.fillText("kyoyouneko.vercel.app", W - 8, 30);

      return canvas.toDataURL("image/png");
    }

    // ============================================================
    // メイン
    // ============================================================
    function App() {
      const [params, setParams] = useState(() => randomParams());
      const votesRef = useRef([]);
      const [votesSnapshot, setVotesSnapshot] = useState([]);
      const [myYesVotes, setMyYesVotes] = useState([]);
      const [myVoteCount, setMyVoteCount] = useState(0);
      const [phase, setPhase] = useState("idle");
      const [lastAnswer, setLastAnswer] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const timer = setTimeout(() => setLoading(false), 5000);
        loadVotes().then(v => {
          votesRef.current = v;
          setVotesSnapshot([...v]);
          setLoading(false);
          clearTimeout(timer);
        }).catch(() => { setLoading(false); clearTimeout(timer); });
        return () => clearTimeout(timer);
      }, []);

      const norm = normalize(params);
      const key = paramsKey(params);
      const hasVoted = votesRef.current.some(v => v.key === key);
      const yesCountForThis = votesRef.current.filter(v => v.key === key && v.isYes).length;
      const yesDisabled = hasVoted || yesCountForThis >= YES_LIMIT;
      const noDisabled = hasVoted;

      async function handleVote(isYes) {
        if (votesRef.current.some(v => v.key === key)) return;
        if (isYes && votesRef.current.filter(v => v.key === key && v.isYes).length >= YES_LIMIT) return;
        const entry = { key, params: { ...params }, isYes, ts: Date.now() };
        votesRef.current = [...votesRef.current, entry];
        setVotesSnapshot([...votesRef.current]);
        if (isYes) setMyYesVotes(prev => [...prev, normalize(params)]);
        setMyVoteCount(prev => prev + 1);
        setLastAnswer(isYes);
        setPhase("voted");
        await saveVote(entry);
      }

      function handleNext() { setParams(randomParams()); setPhase("idle"); setLastAnswer(null); }

      function handleShare() {
        const text = encodeURIComponent("これはネコだと思う #許容猫 #どこまでが猫ですか");
        const url = encodeURIComponent("https://kyoyouneko.vercel.app");
        window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, "_blank");
      }

      const allVotes = votesSnapshot;
      const totalCount = allVotes.length;
      const yesCount = allVotes.filter(v => v.isYes).length;
      const myAvgNorm = myYesVotes.length ? (() => {
        const avg = {};
        PARAM_KEYS.forEach(k => { avg[k] = myYesVotes.reduce((s, n) => s + n[k], 0) / myYesVotes.length; });
        return avg;
      })() : null;
      const allAvgNorm = calcAvgNormParams(allVotes.filter(v => v.isYes));
      const myAvgScores = myAvgNorm ? calcAxisScores(myAvgNorm) : null;
      const allAvgScores = allAvgNorm ? calcAxisScores(allAvgNorm) : null;
      const allFarNorm = calcFarthestNorm(allAvgNorm);
      const myFarNorm = calcFarthestNorm(myAvgNorm);
      const giri1Norm = calcGiriGiriNorm(myYesVotes, true);
      const giri2Norm = calcGiriGiriNorm(myYesVotes, false);

      return (
        <div style={{minHeight:"100vh",background:"#faf5ef",fontFamily:"'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif",color:"#3a2e28",display:"flex",flexDirection:"column",alignItems:"center",paddingBottom:48}}>

          {/* ヘッダー */}
          <div style={{width:"100%",background:"#3a2e28",color:"#faf5ef",padding:"14px 24px",textAlign:"center",marginBottom:20,boxShadow:"0 2px 12px rgba(0,0,0,0.15)"}}>
            <div style={{fontSize:22,fontWeight:700,letterSpacing:"0.08em"}}>許容猫</div>
            <div style={{fontSize:13,opacity:0.7,marginTop:2}}>どこまでが猫ですか？</div>
            <div style={{fontSize:11,opacity:0.45,marginTop:2}}>累計 {totalCount} 票 ／ YES {yesCount} 票</div>
          </div>

          <div style={{width:"100%",maxWidth:460,padding:"0 14px"}}>

            {/* 猫顔 */}
            <div style={{background:"white",borderRadius:20,padding:"20px 0 12px",display:"flex",flexDirection:"column",alignItems:"center",boxShadow:"0 2px 16px rgba(58,46,40,0.09)",marginBottom:14,position:"relative"}}>
              <CatFace norm={norm} size={200}/>
              {phase==="voted" && <div style={{position:"absolute",top:14,right:16,fontSize:30}}>{lastAnswer?"😺":"🙅"}</div>}
            </div>

            {/* 投票ボタン */}
            <div style={{display:"flex",gap:10,marginBottom:10}}>
              <button onClick={()=>handleVote(true)} disabled={yesDisabled||loading}
                style={{flex:1,padding:"14px",borderRadius:14,border:`2px solid ${yesDisabled?"#ddd":"#52b06a"}`,background:"white",color:yesDisabled?"#bbb":"#52b06a",fontSize:17,fontWeight:700,cursor:yesDisabled?"not-allowed":"pointer",fontFamily:"inherit"}}>
                😺 猫です
              </button>
              <button onClick={()=>handleVote(false)} disabled={noDisabled||loading}
                style={{flex:1,padding:"14px",borderRadius:14,border:`2px solid ${noDisabled?"#ddd":"#e8734a"}`,background:"white",color:noDisabled?"#bbb":"#e8734a",fontSize:17,fontWeight:700,cursor:noDisabled?"not-allowed":"pointer",fontFamily:"inherit"}}>
                🙅 猫じゃない
              </button>
            </div>

            {/* 次へ */}
            <button onClick={handleNext} disabled={phase!=="voted"}
              style={{width:"100%",padding:"13px",borderRadius:14,background:phase==="voted"?"#3a2e28":"white",color:phase==="voted"?"#faf5ef":"#ccc",border:`2px solid ${phase==="voted"?"#3a2e28":"#e0d8d0"}`,fontSize:15,fontWeight:700,cursor:phase==="voted"?"pointer":"not-allowed",fontFamily:"inherit",marginBottom:16}}>
              次のランダム猫を見る 🐱
            </button>

            {/* 結果画像＋シェア（自分のYESが1票以上） */}
            {myAvgNorm && (() => {
              const dataUrl = generateResultDataURL(myAvgNorm, myFarNorm, giri1Norm, giri2Norm, myYesVotes.length, myVoteCount);
              return (
                <div style={{marginBottom:14}}>
                  <div style={{background:"white",borderRadius:16,padding:12,boxShadow:"0 2px 12px rgba(58,46,40,0.1)",marginBottom:10}}>
                    <div style={{fontSize:11,color:"#9a8a7a",textAlign:"center",marginBottom:6}}>長押しで画像を保存できます</div>
                    <img src={dataUrl} style={{width:"100%",borderRadius:8,display:"block"}} alt="許容猫 判定レポート"/>
                  </div>
                  <button onClick={handleShare}
                    style={{width:"100%",padding:"13px",borderRadius:14,background:"#1a1a1a",color:"white",border:"none",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit",marginBottom:14}}>
                    𝕏 これはネコだと思う
                  </button>
                </div>
              );
            })()}

            {/* レーダー（自分・みんな平均のみ） */}
            <div style={{background:"white",borderRadius:20,padding:"16px 12px 8px",boxShadow:"0 2px 16px rgba(58,46,40,0.08)",marginBottom:14}}>
              <div style={{fontSize:12,fontWeight:700,textAlign:"center",color:"#7a6a5a",marginBottom:8}}>猫パラメータ レーダー</div>
              <CatRadar myAvg={myAvgScores} allAvg={allAvgScores}/>
              <div style={{fontSize:10,color:"#b0a090",textAlign:"center",marginTop:4}}>
                ⚠️ 自分の平均はリロードで消えます
              </div>
            </div>

            {/* みんなの平均・遠い猫のみ */}
            {(allAvgNorm || allFarNorm) && (
              <div style={{background:"white",borderRadius:20,padding:"16px 10px 12px",boxShadow:"0 2px 16px rgba(58,46,40,0.08)",marginBottom:14}}>
                <div style={{fontSize:12,fontWeight:700,color:"#7a6a5a",textAlign:"center",marginBottom:12}}>猫の顔いろいろ</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                  {[
                    {label:"みんなの平均",norm:allAvgNorm,sub:`${yesCount}票から`},
                    {label:"みんなの平均から遠い",norm:allFarNorm,sub:"各パラメータの逆端"},
                  ].map(({label,norm,sub})=>(
                    <div key={label} style={{textAlign:"center"}}>
                      <div style={{fontSize:10,fontWeight:700,color:"#7a6a5a",marginBottom:2}}>{label}</div>
                      <div style={{fontSize:9,color:"#b0a090",marginBottom:4}}>{sub}</div>
                      {norm?<CatFace norm={norm} size={140}/>:<div style={{height:140,display:"flex",alignItems:"center",justifyContent:"center",color:"#ccc",fontSize:11}}>投票待ち</div>}
                    </div>
                  ))}
                </div>
              </div>
            )}

            {!allAvgNorm && (
              <div style={{background:"white",borderRadius:20,padding:"28px 16px",boxShadow:"0 2px 16px rgba(58,46,40,0.08)",textAlign:"center",color:"#b0a090",fontSize:13}}>
                😺 投票が集まると平均猫が現れます
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
